name: Test suite (kernel + functional + Playwright)

# Runs the behavioral test suites on every PR to main (and pushes to main):
#   - kernel:      every custom module's PHPUnit Kernel suite (config-assembly
#                  source of truth lives in scripts/ci/assemble-config.sh,
#                  shared with the RUNBOOK).
#   - functional:  every custom module's BrowserTestBase Functional suite, run
#                  against a webserver serving the docroot (#35/#36/#44).
#   - e2e:         Playwright smoke suite against a real assembled site (#31, #33).
#
# Issue: #33 (Wave A / A2) under epic #31.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'

jobs:
  # ---------------------------------------------------------------------------
  # Kernel job — the core deliverable. Must be GREEN.
  #
  # The do_tests kernel suite (Phase1/2/3, 20 tests) reads the assembled
  # config/sync off disk via FileStorage and bootstraps a throwaway DB through
  # KernelTestBase. It installs only a handful of core modules and creates no
  # site, so it does NOT need `drush site:install` / `config:import` — it needs
  # (a) the phase-2..7 config assembled into config/sync, (b) the do_tests
  # module in web/modules/custom, and (c) a MySQL service for the kernel DB.
  # ---------------------------------------------------------------------------
  kernel:
    name: Kernel tests (do_tests)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    container:
      image: harbor.performantlabs.com/performantlabs/pl-runner:1.64.0
      credentials:
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}
      options: --user root

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: drupal
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SIMPLETEST_DB: 'mysql://root:root@mysql:3306/drupal'
      SIMPLETEST_BASE_URL: 'http://127.0.0.1:8080'
      # Silence deprecation-triggered failures from contrib/dev dependencies so
      # the suite result reflects our own assertions.
      SYMFONY_DEPRECATIONS_HELPER: 'disabled'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: gd, pdo_mysql, mysqli, mbstring, xml, dom, curl, gmp, bcmath, intl, opcache, zip
          coverage: none
          ini-values: memory_limit=-1

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies (incl. drupal/core-dev)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Assemble config/sync + custom modules (shared with RUNBOOK)
        run: bash scripts/ci/assemble-config.sh

      - name: Prepare Drupal sites/default for kernel bootstrap
        run: |
          set -euxo pipefail
          mkdir -p web/sites/default/files
          # KernelTestBase reads a hash salt from settings; a minimal settings.php
          # plus a writable files dir is enough — no installed site is required.
          if [ ! -f web/sites/default/settings.php ]; then
            cp web/sites/default/default.settings.php web/sites/default/settings.php
          fi
          {
            echo ""
            echo "\$settings['hash_salt'] = 'ci-do-not-use-in-prod-hash-salt';"
            echo "\$settings['config_sync_directory'] = '../config/sync';"
          } >> web/sites/default/settings.php
          chmod -R 777 web/sites/default

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/mysql/3306' 2>/dev/null; then
              echo "MySQL is up"; exit 0
            fi
            echo "waiting for mysql ($i)..."; sleep 2
          done
          echo "MySQL did not become ready" >&2; exit 1

      - name: Run kernel tests (all custom modules)
        run: |
          # Run every custom module's Kernel suite, not just do_tests — the
          # per-module Wave B/C tests (do_multigroup, do_discovery,
          # do_profile_stats, do_group_pin, do_notifications, do_group_*) live
          # under their own tests/src/Kernel and must be gated too.
          # (Functional/BrowserTestBase suites need a served site — tracked
          # separately; this job covers the Kernel layer.)
          KERNEL_DIRS=$(find web/modules/custom -type d -path '*/tests/src/Kernel' | sort)
          echo "Kernel test dirs:"; echo "$KERNEL_DIRS"
          php vendor/bin/phpunit \
            -c web/core/phpunit.xml.dist \
            --testdox \
            $KERNEL_DIRS

  # ---------------------------------------------------------------------------
  # Functional job — every custom module's BrowserTestBase suite (#35/#36/#44).
  #
  # Unlike the E2E job, BrowserTestBase does NOT need a pre-installed, assembled
  # site: each test method installs its OWN throwaway site into a test-prefixed
  # DB (declaring the modules/theme it needs via $modules/$defaultTheme) and then
  # issues real HTTP requests to SIMPLETEST_BASE_URL. Drupal's test router
  # (web/.ht.router.php) reads the per-test DB prefix from the request's
  # User-Agent and boots the prefixed site, so a single plain webserver serving
  # the docroot handles every test's install.
  #
  # What the job therefore needs: composer install (to vendor drupal/group +
  # core-dev, whose GroupBrowserTestBase two of the three suites extend),
  # assemble-config.sh (to place the do_* modules — incl. do_tests — into
  # web/modules/custom so the suites are discoverable and their repo-root-relative
  # fixtures resolve), a MySQL service (SIMPLETEST_DB), a minimal settings.php
  # (hash salt + a writable sites/default so the test router can boot), and a
  # webserver on 127.0.0.1:8080.
  #
  # We serve with the same `php -S … web/.ht.router.php` router BrowserTestBase
  # itself uses locally (Drupal's canonical functional-test webserver), NOT
  # `drush runserver` — no installed site exists to boot, and the router's job is
  # only to dispatch each request into the prefixed test site. Use http:// for
  # SIMPLETEST_BASE_URL: https drops the session cookie in this setup (the B2
  # finding), which would fail every drupalLogin().
  # ---------------------------------------------------------------------------
  functional:
    name: Functional tests (BrowserTestBase)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    container:
      image: harbor.performantlabs.com/performantlabs/pl-runner:1.64.0
      credentials:
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}
      options: --user root

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: drupal
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SIMPLETEST_DB: 'mysql://root:root@mysql:3306/drupal'
      SIMPLETEST_BASE_URL: 'http://127.0.0.1:8080'
      # BrowserTestBase writes its per-test browser output here; a stable dir
      # keeps the failure-diagnostics upload predictable.
      BROWSERTEST_OUTPUT_DIRECTORY: '/tmp/browsertest-output'
      # Silence deprecation-triggered failures from contrib/dev dependencies so
      # the suite result reflects our own assertions.
      SYMFONY_DEPRECATIONS_HELPER: 'disabled'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: gd, pdo_mysql, mysqli, mbstring, xml, dom, curl, gmp, bcmath, intl, opcache, zip
          coverage: none
          ini-values: memory_limit=-1

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies (incl. drupal/core-dev)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Assemble config/sync + custom modules (shared with RUNBOOK)
        run: bash scripts/ci/assemble-config.sh

      - name: Prepare Drupal sites/default for the test router
        run: |
          set -euxo pipefail
          mkdir -p web/sites/default/files "$BROWSERTEST_OUTPUT_DIRECTORY"
          # BrowserTestBase installs each test's own prefixed site, but the test
          # router (web/.ht.router.php) still bootstraps far enough to read a
          # settings.php: a hash salt plus a writable sites/default is enough. No
          # installed site / config:import is required (each test builds its own).
          if [ ! -f web/sites/default/settings.php ]; then
            cp web/sites/default/default.settings.php web/sites/default/settings.php
          fi
          {
            echo ""
            echo "\$settings['hash_salt'] = 'ci-do-not-use-in-prod-hash-salt';"
          } >> web/sites/default/settings.php
          chmod -R 777 web/sites/default

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/mysql/3306' 2>/dev/null; then
              echo "MySQL is up"; exit 0
            fi
            echo "waiting for mysql ($i)..."; sleep 2
          done
          echo "MySQL did not become ready" >&2; exit 1

      - name: Serve the docroot (Drupal test router)
        run: |
          set -uxo pipefail
          # Serve web/ with the SAME router BrowserTestBase uses locally:
          # web/.ht.router.php dispatches each request into the per-test prefixed
          # site (resolving the prefix from the User-Agent), so a single plain
          # `php -S` handles every test's throwaway install. This mirrors how
          # Drupal core's run-tests.sh serves functional tests.
          #
          # Do NOT set PHP_CLI_SERVER_WORKERS here. BrowserTestBase's Mink
          # BrowserKit driver issues STRICTLY SEQUENTIAL requests (no concurrent
          # asset/AJAX sub-requests like a real browser), so a single worker is
          # sufficient — and multiple forked workers actively race on the
          # per-test site's on-disk state (compiled container / Twig template
          # registry), which surfaced as intermittent 500s "Template ... is not
          # defined" (Twig ChainLoader) when one worker served a render before a
          # sibling worker had finished writing that test site's registry.
          #
          # Use an ABSOLUTE router path: `php -S` resolves the router script
          # relative to each request's CWD (the docroot, via -t web), so a
          # relative `web/.ht.router.php` would resolve to `web/web/...` and
          # every request would 500 with "Failed opening required router".
          nohup php -S 127.0.0.1:8080 -t web "$PWD/web/.ht.router.php" \
            >/tmp/phpserver.log 2>&1 &
          echo "server PID $!"
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/ || true)"
            # A bare docroot with no installed site redirects to the installer
            # (302 -> /core/install.php); any HTTP response means the server (and
            # the router) is up and dispatching — that is all the test router
            # needs, since each test installs its own site on demand.
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "server is up (HTTP $code)"; exit 0
            fi
            echo "waiting for server ($i) — last HTTP $code ..."
            if [ "$i" = "3" ]; then echo "--- php -S log so far ---"; cat /tmp/phpserver.log || true; fi
            sleep 2
          done
          echo "server did not come up" >&2
          echo "----- php -S log (full) -----" >&2
          cat /tmp/phpserver.log >&2 || true
          exit 1

      - name: Run functional tests (all custom modules)
        run: |
          # Run every custom module's Functional suite, discovered the same way
          # the kernel job discovers Kernel dirs. Today this is the three do_tests
          # BrowserTestBase suites (#35 GroupAccessEnforcementTest,
          # #36 CreatorMembershipFormTest, #44 GroupAddFormFieldsTest); any future
          # per-module Functional suite is gated automatically.
          FUNCTIONAL_DIRS=$(find web/modules/custom -type d -path '*/tests/src/Functional' | sort)
          echo "Functional test dirs:"; echo "$FUNCTIONAL_DIRS"
          if [ -z "$FUNCTIONAL_DIRS" ]; then
            echo "No Functional test dirs found — assemble-config.sh did not place the modules." >&2
            exit 1
          fi
          php vendor/bin/phpunit \
            -c web/core/phpunit.xml.dist \
            --testdox \
            $FUNCTIONAL_DIRS

      - name: Functional failure diagnostics
        if: failure()
        run: |
          echo "----- php -S server log (tail) -----"
          tail -120 /tmp/phpserver.log || true
          echo "----- BrowserTestBase HTML output (names) -----"
          # BrowserTestBase writes browser dumps to BROWSERTEST_OUTPUT_DIRECTORY
          # when set, else to web/sites/simpletest/browser_output.
          find "$BROWSERTEST_OUTPUT_DIRECTORY" web/sites/simpletest/browser_output \
            -type f 2>/dev/null | sort || true

      - name: Upload functional failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: functional-browsertest-output
          path: |
            /tmp/phpserver.log
            /tmp/browsertest-output
            web/sites/simpletest/browser_output
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # E2E job — Playwright smoke suite against a real assembled site (#33).
  #
  # Stands up a full Drupal install, imports the assembled config, enables the
  # do_* modules, serves the site with `drush runserver`, and runs the #30
  # Playwright suite against it.
  #
  # SERVE BLOCKER RESOLVED (#33): the old "serve returns 302 -> /core/install.php"
  # was NOT a serving problem — the drush commands here were invoked as
  # `php vendor/bin/drush …`, and on Linux `vendor/bin/drush` is Composer's
  # bin-proxy *shell* script, so `php <shell-script>` merely ECHOED the proxy
  # and never ran drush. The site was therefore never installed, so every
  # request bounced to the installer. Fix: call the drush PHP entrypoint
  # (`php vendor/drush/drush/drush.php …`) directly. Two more clean-room needs
  # were then addressed: (a) config:import requires the active site UUID to
  # match config/sync + the sync dir to point at config/sync (drush's default
  # sync dir is a hashed, empty dir under sites/default/files), and (b) drush's
  # $databases block in settings.php is read by the runserver child process.
  # With these, install + config:import + serve + Playwright all execute and 3
  # of the 4 phase-1 tests pass on CI.
  #
  # RESIDUAL (non-serve, tracked under #43): phase-1 test 3 ("authenticated user
  # can create group") submits the community_group add form with only a Title,
  # but the assembled config marks field_group_description `required: true`, and
  # on the CI runner (PHP 8.4) that field is surfaced on the auto-generated
  # community_group add form, so the submit fails validation ("Description field
  # is required") and never redirects to /group/{id}. (The same build serves and
  # passes test 3 on a local PHP 8.3 runner, where the field is not placed on the
  # add form — an environment-dependent auto-form-display outcome that the repo
  # has no explicit entity_form_display.group.community_group.default to pin.)
  # As of #44 the community_group add-form display is committed (description +
  # visibility are required) and the phase-1 spec fills them (#53 follow-up), so
  # the suite is green end-to-end and this job is BLOCKING. The "E2E failure
  # diagnostics" step below captures runserver log + Playwright error-context on
  # any regression.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        shell: bash
    container:
      image: harbor.performantlabs.com/performantlabs/pl-runner:1.64.0
      credentials:
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}
      options: --user root

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: drupal
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DRUPAL_DB_URL: 'mysql://root:root@mysql:3306/drupal'
      BASE_URL: 'http://127.0.0.1:8080'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: gd, pdo_mysql, mysqli, mbstring, xml, dom, curl, gmp, bcmath, intl, opcache, zip
          coverage: none
          ini-values: memory_limit=-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Assemble config/sync + custom modules (shared with RUNBOOK)
        run: bash scripts/ci/assemble-config.sh

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if bash -c 'echo > /dev/tcp/mysql/3306' 2>/dev/null; then
              echo "MySQL is up"; exit 0
            fi
            echo "waiting for mysql ($i)..."; sleep 2
          done
          echo "MySQL did not become ready" >&2; exit 1

      - name: Install Drupal + import assembled config
        run: |
          set -euxo pipefail
          # Make sites/default writable so drush can write settings.php.
          mkdir -p web/sites/default
          chmod -R u+w web/sites/default
          # 1) Standard install. drush writes a COMPLETE $databases block into
          #    web/sites/default/settings.php (with the driver namespace/autoload
          #    keys D11's Connection needs); we leave it untouched.
          php vendor/drush/drush/drush.php site:install standard \
            --db-url="$DRUPAL_DB_URL" \
            --account-name=admin --account-pass=admin \
            --site-name='Groups on D11' -y
          # drush locks settings.php read-only after install; make it writable so
          # the appends below (and drush's own writes) succeed.
          chmod u+w web/sites/default web/sites/default/settings.php
          # 2) A clean `config:import` requires the active site UUID to match the
          #    assembled config's system.site UUID, and the sync directory to
          #    point at the repo's config/sync (drush's default is a hashed,
          #    empty dir under sites/default/files, which made import a no-op).
          SRC_UUID="$(grep '^uuid:' config/sync/system.site.yml | awk '{print $2}')"
          php vendor/drush/drush/drush.php config:set system.site uuid "$SRC_UUID" -y
          printf "\n\$settings['config_sync_directory'] = '../config/sync';\n" \
            >> web/sites/default/settings.php
          # 3) Import the assembled config (all_groups view, community_group group
          #    type, permissions, do_* config). Requires `language` in the
          #    assembled core.extension.yml (added by assemble-config.sh) so
          #    do_group_language installs cleanly.
          php vendor/drush/drush/drush.php config:import -y
          # 4) Ensure the custom modules are enabled (idempotent after import),
          #    set the admin password phase1.spec.ts logs in with, rebuild caches.
          php vendor/drush/drush/drush.php en -y \
            do_tests do_group_extras do_group_language do_group_mission \
            do_group_pin do_multigroup do_notifications do_profile_stats do_discovery
          php vendor/drush/drush/drush.php user:password admin 'admin'
          # 4b) #129 workaround: config:import does NOT run installDefaultConfig()
          #     for modules whose ACTIVE core.extension.yml already lists them
          #     (as this codebase's assembled core.extension.yml does for every
          #     do_* custom module). do_activity_feed ships views.view.activity_feed
          #     ONLY under config/install/, not config/sync/ — so its view never
          #     lands via cim. Force the install-config drop by disabling and
          #     re-enabling the module, which triggers hook_install() and its
          #     defensive installDefaultConfig() self-heal (do_activity_feed.install).
          php vendor/drush/drush/drush.php pmu do_activity_feed -y
          php vendor/drush/drush/drush.php en do_activity_feed -y
          php vendor/drush/drush/drush.php cache:rebuild -y
          # drush site:install writes a complete $databases block (incl. the mysql
          # driver namespace/autoload keys) into settings.php, which the runserver
          # child process reads per request. Add a trusted host for the served
          # requests over 127.0.0.1/localhost.
          printf "\n\$settings['trusted_host_patterns'] = ['^127\\\\.0\\\\.0\\\\.1\$', '^localhost\$'];\n" \
            >> web/sites/default/settings.php
          # Diagnostic: confirm settings.php carries $databases, and drush sees an
          # installed, bootstrapped, connected site.
          echo "--- settings.php \$databases present? ---"
          grep -c "databases\['default'\]\['default'\]" web/sites/default/settings.php || true
          php vendor/drush/drush/drush.php status --fields=drupal-version,db-status,bootstrap

      - name: Seed full demo data (groups, content, types, nav, personas) — mirror the deployed image
        # CI installs + imports config but does NOT run the container entrypoint,
        # so without this the site has NO demo groups, members, group-type tags,
        # nav links, or persona-switcher accounts — and directory-cards.spec.ts
        # (#84), nav.spec.ts (#83), the phase2/3/4 specs that assert seeded
        # groups/streams, and persona-switcher.spec.ts (#120) that assert the
        # `groups_moderate_demo` account + Maria's Organizer grant + the pending
        # relationship, would all fail even though the deployed image renders
        # them. Run the SAME scripts the entrypoint runs, in the same order, as
        # uid 1 (matches the entrypoint's seed-as-admin wrapper so
        # do_group_extras' unpublish-on-create presave hook leaves the seeded
        # groups published). All scripts are idempotent.
        #
        # Absolute script paths: under `drush php:script`, PHP's getcwd() resolves
        # to the docroot, not the workspace, so relative requires break. Resolve
        # every path against $PWD (the workspace root) explicitly.
        run: |
          set -euxo pipefail
          DEMO_SCRIPT="$PWD/docs/groups/scripts/step_700_demo_data.php"
          TYPES_SCRIPT="$PWD/docs/groups/scripts/step_720_group_types.php"
          NAV_SCRIPT="$PWD/docs/groups/scripts/step_780_nav_menu.php"
          PERSONA_SCRIPT="$PWD/docs/groups/scripts/step_790_persona_switcher.php"
          # 1) Demo data (users, 8 groups, memberships, in-group content) as uid 1.
          cat > /tmp/seed-demo.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${DEMO_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/seed-demo.php
          # 2) Group types: field_group_type + 5 terms + tag the 8 groups (needs the
          #    groups from step 1). Same shared script the entrypoint runs.
          cat > /tmp/seed-types.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${TYPES_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/seed-types.php
          # 3) Header-navigation menu links (nav.spec.ts).
          cat > /tmp/seed-nav.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${NAV_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/seed-nav.php
          # 4) Persona-switcher seed (#120 SC-1): groups_moderate role +
          #    groups_moderate_demo account, Maria's Organizer grant, one pending
          #    group_relationship (persona-switcher.spec.ts).
          cat > /tmp/seed-persona.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${PERSONA_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/seed-persona.php
          # --- do_activity step_7xx BEGIN ---
          # Marker convention (established by #116): all activity-layer backfills
          # live between BEGIN/END markers so a later story (#113) can rebase
          # against them. Runs LAST in the seed sequence (after groups,
          # memberships, content, nav, and personas all exist above) so the
          # backfill has everything to catch up on — its idempotency key
          # (template + field_referenced_entity_type + field_referenced_entity_id
          # + created) is what keeps it a true no-op against the Messages
          # do_activity's own live hooks already logged as steps 1-4 ran.
          ACTIVITY_BACKFILL_SCRIPT="$PWD/docs/groups/scripts/step_7xx_backfill_activity.php"
          cat > /tmp/backfill-activity.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${ACTIVITY_BACKFILL_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/backfill-activity.php
          # --- do_activity step_7xx END ---
          # --- do_activity_feed step_795 BEGIN ---
          # #129 ST-7: activity feed E2E fixture. Seeds Elena a deterministic
          # (social + aggregated + content) mix she's guaranteed to see on
          # /activity — do_activity's incidental hook-noise doesn't produce
          # the specific aggregated run AC-6 asserts on. Runs AFTER the
          # backfill so its idempotency check covers already-logged Messages.
          FEED_FIXTURE_SCRIPT="$PWD/docs/groups/scripts/step_795_activity_feed_e2e_fixture.php"
          cat > /tmp/seed-activity-feed-fixture.php <<PHP
          <?php
          \$admin = \Drupal\user\Entity\User::load(1);
          if (\$admin) { \Drupal::currentUser()->setAccount(\$admin); }
          require '${FEED_FIXTURE_SCRIPT}';
          PHP
          php vendor/drush/drush/drush.php php:script /tmp/seed-activity-feed-fixture.php
          # --- do_activity_feed step_795 END ---
          # --- do_discovery cron BEGIN ---
          # #113 ST-4: run cron so do_discovery_hot_score is populated for
          # /trending's e2e spec (hook_cron recomputes for nodes changed in
          # the last 7 days). Runs AFTER seeds so the two 2-comment threads
          # score 6.0 and outrank the 0-comment ones.
          php vendor/drush/drush/drush.php cron
          # --- do_discovery cron END ---
          php vendor/drush/drush/drush.php cache:rebuild -y

      - name: Serve the site
        run: |
          set -uxo pipefail
          # Serve with `drush runserver`, which boots Drupal's kernel and then
          # serves via drush's own router (d8-rs-router.php) — unlike a bare
          # `php -S web/.ht.router.php`, whose served process returned an EMPTY
          # plugin registry for views/blocks. Invoke the drush PHP entrypoint
          # directly (NOT `php vendor/bin/drush`, which is a shell bin-proxy that
          # `php` would merely echo) with an explicit --root so the web/ docroot
          # is detected when backgrounded from the repo root. No --uri: runserver
          # takes the bind address as its own argument, and passing --uri made
          # drush resolve the DB connection in a way that missed settings.php's
          # $databases. `-v` gives a readable startup log.
          #
          # PHP_CLI_SERVER_WORKERS makes the built-in server (which runserver
          # spawns) fork multiple workers so it can handle the sub-requests a
          # single page issues concurrently. Without it the single-threaded
          # server serializes requests and the group-create POST (which the
          # browser fires alongside asset/AJAX requests) timed out at 20s.
          export PHP_CLI_SERVER_WORKERS=8
          nohup php vendor/drush/drush/drush.php --root="$PWD/web" -v \
            runserver --no-browser 127.0.0.1:8080 \
            >/tmp/runserver.log 2>&1 &
          echo "server PID $!"
          for i in $(seq 1 45); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/user/login || true)"
            if [ "$code" = "200" ]; then
              echo "site is serving (HTTP $code)"; exit 0
            fi
            echo "waiting for site ($i) — last HTTP $code ..."
            # Surface any startup error early instead of waiting the full window.
            if [ "$i" = "3" ]; then echo "--- runserver log so far ---"; cat /tmp/runserver.log || true; fi
            sleep 2
          done
          echo "site did not come up" >&2
          echo "----- curl -i /user/login -----" >&2
          curl -s -i http://127.0.0.1:8080/user/login | head -25 >&2 || true
          echo "----- runserver log (full) -----" >&2
          cat /tmp/runserver.log >&2 || true
          exit 1

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E suite
        run: npx playwright test

      - name: E2E failure diagnostics
        if: failure()
        run: |
          echo "----- runserver log (tail) -----"
          tail -120 /tmp/runserver.log || true
          echo "----- playwright error-context files -----"
          find test-results -name 'error-context.md' -exec sh -c \
            'echo "== $1 =="; cat "$1"' _ {} \; 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results
            playwright-report
          retention-days: 7
          if-no-files-found: ignore
