# .pr_agent.toml — PR-Agent configuration template
# Part of playbook/pipelines/pr-reviewer/
#
# Copy to your project root and customise the extra_instructions section
# to match your project's skills/, forbidden patterns, and conventions.
#
# Docs: https://qodo-merge-docs.qodo.ai/usage-guide/configuration_options/

[config]
model = "deepseek/deepseek-v4-pro"
fallback_models = ["deepseek/deepseek-v4-pro"]
verbosity_level = 1
max_description_tokens = 1500
max_commits_tokens = 1500
custom_model_max_tokens = 131072
# Raised above the 32K default so full diffs fit without driving the
# output-token budget negative on large PRs.
max_model_tokens = 64000

[pr_reviewer]
require_score_review = true
require_tests_review = true
require_security_review = true
require_focused_review = false
require_ticket_analysis_review = false
num_code_suggestions = 4
inline_code_comments = true
automatic_review = true
persistent_comment = true
final_update_message = false
extra_instructions = """
You are the SPEC-ENFORCER for this project. Your job is drift detection, not code improvement.

MANDATORY CONTEXT — read before scoring:
1. CLAUDE.md at repo root — project overview, forbidden patterns, review priorities.
2. Every file in skills/ — architectural conventions. Cite the skill filename when flagging a violation.
3. docs/planning/decisions.md (if present) — locked decisions. Do not suggest changes counter to them.
4. docs/planning/architecture.md (if present) — stack conventions and constraints.

PRIMARY JOB — spec drift detection:
1. Does the diff honour every applicable skill in skills/? Quote the skill filename for each violation.
2. Does any pattern in CLAUDE.md's "Forbidden patterns" section appear in the diff? = BLOCKING.
3. Are secrets committed (credentials, API keys, tokens)? = BLOCKING.
4. Are there missing tests for new routes or public functions? = BLOCKING.

SECONDARY JOB — quality:
- Security issues (auth bypass, injection, rate-limiting, CSRF).
- Runtime regressions (race conditions, leaks, unbounded queries).

REVIEW STYLE:
- Distinguish BLOCKING (spec drift, forbidden pattern, security, missing required tests)
  from NIT (style, preference). Every BLOCKING finding MUST cite its source.
- Do not suggest rewrites or alternative architectures. This repo follows the spec deliberately.
- When in doubt between blocking and nit, prefer nit — false positives erode trust.

OUTPUT SHAPE:
- Lead with a one-line verdict: BLOCKING / NITS / CLEAN.
- Then the standard PR-Agent sections.
- Inline comments focus on exact lines violating a cited rule.
"""

[pr_code_suggestions]
num_code_suggestions = 4
summarize = true
extra_instructions = """
Only suggest changes that bring the diff into compliance with skills/*.md or docs/planning/*.md.
Every suggestion must cite its source (skill filename or spec section).
Do not suggest refactors or alternative patterns not required by the spec.
"""

[pr_description]
publish_description_as_comment = false
add_original_user_description = true
keep_original_user_title = true

[github]
publish_inline_comments = true
publish_output = true
publish_output_progress = false

[github_action_config]
auto_review = true
auto_improve = false
pr_actions = ["opened", "reopened", "ready_for_review", "review_requested", "synchronize"]

[litellm]
drop_params = true
max_model_len = 131072

[ignore]
glob = [
  'package-lock.json',
  'yarn.lock',
  'pnpm-lock.yaml',
  'dist/**',
  'coverage/**',
  '*.min.js',
  '*.min.css',
  'docs/handoffs/**',
]
