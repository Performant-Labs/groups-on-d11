# do_showcase's own libraries — switcher interaction + ribbon dismiss. Both
# are locally-authored (no CDN, matching epic #78's locally-vendored house
# style). Neither adds a new tooltip engine — tooltips are rendered by
# do_chrome/tooltips (attached alongside these on the pages that need it).
switcher:
  version: '1.0'
  js:
    js/do_showcase.switcher.js: {}
  css:
    theme:
      css/do_showcase.css: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings

ribbon:
  version: '1.0'
  js:
    js/do_showcase.ribbon.js: {}
  css:
    theme:
      css/do_showcase.css: {}
  dependencies:
    - core/drupal
    - core/once

# #120 SC-1: persona-switcher widget + persistent banner styling. No JS file
# here — the widget's "auto-submit on change" behavior is a minimal inline
# onchange="..." attribute on the <select> itself (PersonaSwitcher::build()),
# so no external behavior-attach script is needed for that interaction. This
# library exists to load the visual styling only (focus-ring token, banner
# dark/light contrast pairing, matching .do-showcase-ribbon's already-AA
# pairing) — see css/persona-switcher.css.
persona-switcher:
  version: '1.0'
  css:
    theme:
      css/persona-switcher.css: {}

# #124 SC-5: the compact-list row presentation for /all-groups, attached by
# DoShowcaseHooks::viewsPreRender() alongside `do_showcase/switcher`
# whenever the all_groups.page_1 view renders. CSS-ONLY (brief.md "Owned
# files": "docs/groups/modules/do_showcase/css/directory-compact.css
# (new)") — the compact/cards toggle is a pure presentation delta over the
# SAME row markup groups_chrome's views-view-fields--all-groups.html.twig
# already renders (wireframe.md Surface 2/3: "no schema/Views-field change,
# CSS alone hides/restyles"). Depends on `do_showcase/switcher` so the
# wrapper-mirror data-* attributes it reads
# (data-do-showcase-mirror-attribute/-selector, set on the switcher's own
# render array below) are guaranteed present before this library's styling
# would ever need to react to a live (no-reload) toggle.
directory-compact:
  version: '1.0'
  css:
    theme:
      css/directory-compact.css: {}
  dependencies:
    - do_showcase/switcher

# #123 SC-4 (Discovery three ways): "Discovery ranking" comparison section
# styling on /showcase, attached by ShowcaseController::page() ONLY on the
# discovery_ranking render subtree (never site-wide) — CSS-ONLY, mirrors the
# #124 SC-5 directory-compact library's own precedent immediately above.
# Depends on `do_showcase/switcher` so the shared switcher styling
# (radiogroup/[role="radio"]/focus-visible, do_showcase.css) is guaranteed
# present — this library deliberately does NOT redefine any of it (wireframe.md
# "WCAG 2.2 AA notes": "should NOT redefine focus style, just import/match the
# same outline color+width for consistency").
discovery-compare:
  version: '1.0'
  css:
    theme:
      css/discovery-compare.css: {}
  dependencies:
    - do_showcase/switcher
