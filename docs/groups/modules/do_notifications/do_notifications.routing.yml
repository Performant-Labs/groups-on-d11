do_notifications.notification_settings:
  path: '/user/{user}/notification-settings'
  defaults:
    _controller: '\Drupal\do_notifications\Controller\NotificationSettingsController::page'
    _title: 'Notification Settings'
  requirements:
    _permission: 'access content'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

do_notifications.cancel_all:
  path: '/user/{user}/notification-settings/cancel-all'
  defaults:
    _form: '\Drupal\do_notifications\Form\CancelAllSubscriptionsForm'
    _title: 'Cancel All Subscriptions'
  requirements:
    _permission: 'access content'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

do_notifications.admin_settings:
  path: '/admin/config/people/notification-defaults'
  defaults:
    _form: '\Drupal\do_notifications\Form\NotificationDefaultsForm'
    _title: 'Notification Defaults'
  requirements:
    _permission: 'administer site configuration'
