services:
  logger.channel.do_multigroup:
    parent: logger.channel_base
    arguments: ['do_multigroup']

  do_multigroup.hooks:
    class: Drupal\do_multigroup\Hook\DoMultigroupHooks
    autowire: false
    arguments:
      - '@current_user'
      - '@entity_type.manager'
      - '@current_route_match'
    tags:
      - { name: 'hook_implementations' }
