name: DO Activity
description: 'Activity log foundation — records post/comment/membership/flag/pin events as Message entities for later stream rendering (#116).'
type: module
core_version_requirement: ^11.2
package: Custom
# NOTE (F, Phase 5, #116): extended by the Feature Implementor from T's Phase-4
# RED skeleton. Dependencies below are the full stack the six log points +
# deletion hygiene need; do_group_pin is NOT a hard dependency (do_activity
# reacts to raw flagging_insert/_delete per the brief's model, matching the
# flag id, not do_group_pin's own hooks) — see
# src/Hook/DoActivityHooks.php and the amended brief
# (docs/planning/handoffs/116-activity/brief-amended.md).
dependencies:
  - drupal:message
  - drupal:message_notify
  - drupal:group
  - drupal:gnode
  - drupal:node
  - drupal:comment
  - drupal:flag
  - drupal:user
