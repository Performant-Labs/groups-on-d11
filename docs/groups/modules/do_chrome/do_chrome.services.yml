services:
  do_chrome.hooks:
    class: Drupal\do_chrome\Hook\DoChromeHooks
    autowire: false
    arguments:
      - '@current_route_match'
    tags:
      - { name: 'hook_implementations' }

  # #92 archive / pin / promote / follow tooltip surfaces. Own service so the
  # story stays parallel-safe (no edit to another surface's hook class).
  do_chrome.archive_pin_hooks:
    class: Drupal\do_chrome\Hook\ArchivePinHooks
    autowire: false
    tags:
      - { name: 'hook_implementations' }

  # #126 (SD-1): page-level ⓘ tooltips. Own service (own route-map + own
  # hook method) so this story stays parallel-safe with the other tooltip
  # surfaces above.
  do_chrome.page_help:
    class: Drupal\do_chrome\Hook\PageHelp
    autowire: false
    arguments:
      - '@current_route_match'
    tags:
      - { name: 'hook_implementations' }
