do_discovery.ical_site:
  path: '/upcoming-events/ical'
  defaults:
    _controller: '\Drupal\do_discovery\Controller\IcalController::siteEvents'
    _title: 'Upcoming Events (iCal)'
  requirements:
    _permission: 'access content'

do_discovery.ical_group:
  path: '/group/{group}/events/ical'
  defaults:
    _controller: '\Drupal\do_discovery\Controller\IcalController::groupEvents'
    _title: 'Group Events (iCal)'
  requirements:
    _permission: 'access content'

do_discovery.ical_user:
  path: '/user/{user}/events/ical'
  defaults:
    _controller: '\Drupal\do_discovery\Controller\IcalController::userEvents'
    _title: 'User Events (iCal)'
  requirements:
    _permission: 'access content'
