# Library definitions for the Groups Chrome subtheme.
#
# `global` is attached on every page (see groups_chrome.info.yml `libraries:`).
# It loads the design tokens first, then the reusable primitives that build on
# those tokens. A-stories (#82–#87) should ADD their own library entries here
# (one per component area) and attach them per-page/per-template, rather than
# appending to `global`, so component CSS stays isolated and cache-friendly.

global:
  version: 1.x
  css:
    # `base` weight loads tokens ahead of theme/component styles so the custom
    # properties are defined before anything consumes them.
    base:
      css/tokens.css: {}
    theme:
      css/primitives.css: {}

# Activity stream feed (#86 / CH-A4). Attached per-row by
# groups_chrome_preprocess_node() to the `stream_card` node view mode, so the
# feed CSS only loads on /stream (and the stream block), not site-wide.
stream:
  version: 1.x
  css:
    theme:
      css/stream.css: {}

# Region chrome — breadcrumb, footer, and views empty-state styling (#87).
# Attached globally alongside `global` (see info.yml `libraries:`) because the
# breadcrumb and footer render on every page. Depends on `global` for tokens.
regions:
  version: 1.x
  css:
    theme:
      css/chrome.css: {}
  dependencies:
    - groups_chrome/global

# Single-group page furniture (#85 / CH-A3): header badges, member avatars,
# join/leave action, and the Stream/Events/Members/About tab bar. Attached
# per-page by groups_chrome_preprocess_group() to the group `full` view mode
# (the canonical /group/{id} route), so this CSS only loads on group pages.
# Depends on `global` for the design tokens + badge/button primitives it builds on.
group_page:
  version: 1.x
  css:
    theme:
      css/group-page.css: {}

# Group directory cards (#84 / CH-A2). Attached by
# groups_chrome_preprocess_views_view_fields__all_groups() to the all_groups
# view rows, so the directory-card CSS only loads on /all-groups (and any other
# embed of that view), not site-wide. Depends on `global` for tokens +
# card/badge/button primitives.
directory:
  version: 1.x
  css:
    theme:
      css/directory.css: {}
  dependencies:
    - groups_chrome/global

# Group-type homepage lead section (#122 / SC-3). Attached ONLY when
# groups_chrome_preprocess_group() sets a non-empty gc_group.lead_items — an
# unmapped/untyped group (or a mapped type with zero qualifying/accessible
# content) attaches nothing new, so the fallback page's CSS payload stays
# byte-identical to before this story (wireframe.md §5's AC-critical wiring).
# Depends on `global` for the design tokens the component CSS consumes.
group_type_homepage:
  version: 1.x
  css:
    theme:
      css/group-type-homepage.css: {}
  dependencies:
    - groups_chrome/global
