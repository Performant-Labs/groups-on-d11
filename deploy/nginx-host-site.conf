server {
    server_name groups.performantlabs.com;

    access_log /var/log/nginx/groups_on_d11_access.log;
    error_log  /var/log/nginx/groups_on_d11_error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 64M;

    # Proxy all requests to nginx inside the container
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    listen 80;
    listen [::]:80;
    # SSL managed by Certbot — run: certbot --nginx -d groups.performantlabs.com
}
