server {
    server_name groups.performantlabs.com;

    access_log /var/log/nginx/groups_on_d11_access.log;
    error_log  /var/log/nginx/groups_on_d11_error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/groups-on-d11/web;   # symlink or bind-mount webroot, OR use fastcgi_param below
    index index.php index.html;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }

    location ~ '\.php$|^/update.php' {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Forward to php-fpm inside the container on port 8084
        fastcgi_pass 127.0.0.1:8084;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTPS on;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 600;
        fastcgi_intercept_errors off;
        include fastcgi_params;
    }

    location ~* /\.(?!well-known\/) {
        deny all;
    }

    location ~* \.(jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|webp|htc)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
    }

    location ~* \.(js|css)$ {
        try_files $uri @rewrite;
        expires 7d;
        log_not_found off;
    }

    # SSL managed by Certbot — run: certbot --nginx -d groups.performantlabs.com
    listen 80;
    listen [::]:80;
}
